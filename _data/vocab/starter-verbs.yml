# Section 6: Essential irregular verbs (hunn, sinn, goen, kommen, kënnen, maachen)
- id: "starter-verbs_027"
  lb: "hunn"
  en: "to have"
  pos: "verb"
  difficulty: 1
  irregular: true
  conjugation: "Ech hunn, du hues, hien/si huet, mir hunn, dir hutt, si hunn"

- id: "starter-verbs_028"
  lb: "sinn"
  en: "to be"
  pos: "verb"
  difficulty: 1
  irregular: true
  conjugation: "Ech sinn, du bass, hien/si ass, mir sinn, dir sidd, si sinn"

- id: "starter-verbs_029"
  lb: "goen"
  en: "to go"
  pos: "verb"
  difficulty: 1
  irregular: true
