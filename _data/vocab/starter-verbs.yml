  irregular: true
  conjugation: "Ech kommen, du kënns, hien/si kënnt, mir kommen, dir kommt, si kommen"

- id: "starter-verbs_031"
  lb: "kënnen"
  en: "can/be able to"
  pos: "verb"
  difficulty: 1
