# Starter Verbs — Sections 5 & 6 of the Luxembourgish Vocabulary Master List
# Core verbs to get speaking immediately + essential irregular verb conjugations

# Section 5: Regular starter verbs
- id: "starter-verbs_001"
  lb: "äntweren"
  en: "to answer"
  pos: "verb"
  difficulty: 1
  example_lb: "Ech äntweren op d'Fro."
  example_en: "I answer the question."

- id: "starter-verbs_002"
  lb: "baken"
