{% comment %}
  Cross-links grid — shows the other 3 positions.
  Usage: {% include position-crosslinks.html active="ai-operations" %}
{% endcomment %}
<div class="pos-crosslinks">
  <h3 class="pos-crosslinks-title">Other positions</h3>
  <div class="pos-crosslinks-grid">
    {% for p in site.data.positions %}
      {% if p.tag != include.active %}
      <a href="{{ p.url }}" class="pos-crosslinks-card">
        <span class="pos-crosslinks-num">POSITION {{ p.number }}</span>
        <span class="pos-crosslinks-name">{{ p.title }}</span>
      </a>
      {% endif %}
    {% endfor %}
  </div>
</div>
