<div id="contact-form-wrapper">
  <form id="contact-form" class="contact-form" onsubmit="submitContactForm(event)">
    <input type="text" name="_gotcha" class="contact-honeypot" tabindex="-1" autocomplete="off">

    <div class="contact-row">
      <div class="form-group">
        <label for="contact-name" class="contact-label">Name</label>
        <input type="text" id="contact-name" name="name" required placeholder="Your name" class="contact-input" />
      </div>
      <div class="form-group">
        <label for="contact-email" class="contact-label">Email</label>
        <input type="email" id="contact-email" name="email" required placeholder="your@email.com" class="contact-input" />
      </div>
    </div>

    <div class="form-group contact-msg-group">
      <label for="contact-message" class="contact-label">Message</label>
      <textarea id="contact-message" name="message" rows="6" required placeholder="What's on your mind?" class="contact-textarea"></textarea>
    </div>

    <div class="form-group contact-consent-group">
      <label class="contact-consent-label">
        <input type="checkbox" id="contact-consent" required>
        <span>I agree to be contacted in the future and to receive occasional updates from Hasan Jaffal.</span>
      </label>
    </div>

    <button type="submit" id="contact-submit-btn" class="contact-btn" disabled>
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Send Message
    </button>
  </form>
</div>

<!-- Success state -->
<div id="contact-success" class="contact-success">
  <div class="contact-success-icon">
    <svg width="24" height="24" fill="none" stroke="#16A34A" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h3 class="contact-success-title">Message sent</h3>
  <p class="contact-success-desc">Thank you for reaching out. I will get back to you within a few days.</p>
  <button onclick="resetContactForm()" class="contact-success-reset">Send another message</button>
</div>

<!-- Error state -->
<div id="contact-error" class="contact-error">
  <p class="contact-error-text">
    <svg width="16" height="16" fill="none" stroke="#DC2626" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    Could not send message. Please try again or email me directly at hasan@hasanjaffal.com
  </p>
</div>

<script>
// Enable/disable send button based on consent checkbox
document.getElementById('contact-consent').addEventListener('change', function() {
  document.getElementById('contact-submit-btn').disabled = !this.checked;
});

function submitContactForm(e) {
  e.preventDefault();
  var name = document.getElementById('contact-name').value.trim();
  var email = document.getElementById('contact-email').value.trim();
  var message = document.getElementById('contact-message').value.trim();
  var btn = document.getElementById('contact-submit-btn');
  var errorEl = document.getElementById('contact-error');

  if (!name || !email || !message) return;
  if (document.querySelector('[name="_gotcha"]').value) return;
  if (!document.getElementById('contact-consent').checked) return;

  btn.disabled = true;
  btn.innerHTML = '<svg width="15" height="15" class="contact-spinner" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg> Sending...';
  errorEl.style.display = 'none';

  fetch('{{ site.data.firebase.fn_contact }}', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({data: {name: name, email: email, message: message}})
  }).then(function(res) {
    if (res.ok) {
      document.getElementById('contact-form-wrapper').style.display = 'none';
      document.getElementById('contact-success').style.display = 'block';

      // Subscribe the user to the mailing list (main_website segment)
      var fnUrl = document.querySelector('meta[name="fn-subscribe"]');
      var subscribeUrl = fnUrl ? fnUrl.getAttribute('content') : '';
      if (subscribeUrl) {
        fetch(subscribeUrl, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email: email, name: name, utm_source: 'contact_form'})
        }).catch(function(){});
      }
    } else {
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Message';
    }
  }).catch(function() {
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Message';
  });
}

function resetContactForm() {
  document.getElementById('contact-form-wrapper').style.display = 'block';
  document.getElementById('contact-success').style.display = 'none';
  document.getElementById('contact-form').reset();
  document.getElementById('contact-submit-btn').disabled = true;
}
</script>
