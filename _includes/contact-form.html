<div id="contact-form-wrapper">
  <form id="contact-form" class="contact-form" onsubmit="submitContactForm(event)">
    <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
      <div class="form-group" style="margin:0;">
        <label for="contact-name" style="font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;">Name</label>
        <input type="text" id="contact-name" name="name" required placeholder="Your name" style="width:100%;padding:12px 16px;border:1px solid var(--slate-border);border-radius:8px;font-size:0.88rem;background:var(--white);color:var(--dark);outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='#9333EA'" onblur="this.style.borderColor=''" />
      </div>
      <div class="form-group" style="margin:0;">
        <label for="contact-email" style="font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;">Email</label>
        <input type="email" id="contact-email" name="email" required placeholder="your@email.com" style="width:100%;padding:12px 16px;border:1px solid var(--slate-border);border-radius:8px;font-size:0.88rem;background:var(--white);color:var(--dark);outline:none;transition:border-color 0.2s;" onfocus="this.style.borderColor='#9333EA'" onblur="this.style.borderColor=''" />
      </div>
    </div>

    <div class="form-group" style="margin:0 0 20px;">
      <label for="contact-message" style="font-size:0.72rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:6px;">Message</label>
      <textarea id="contact-message" name="message" rows="6" required placeholder="What's on your mind?" style="width:100%;padding:12px 16px;border:1px solid var(--slate-border);border-radius:8px;font-size:0.88rem;background:var(--white);color:var(--dark);outline:none;resize:vertical;transition:border-color 0.2s;line-height:1.6;" onfocus="this.style.borderColor='#9333EA'" onblur="this.style.borderColor=''"></textarea>
    </div>

    <button type="submit" id="contact-submit-btn" style="display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:#0F172A;color:#fff;font-size:0.82rem;font-weight:600;border-radius:8px;border:none;cursor:pointer;transition:background 0.2s;">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      Send Message
    </button>
  </form>
</div>

<!-- Success state -->
<div id="contact-success" style="display:none;text-align:center;padding:48px 24px;">
  <div style="width:56px;height:56px;background:rgba(22,163,74,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
    <svg width="24" height="24" fill="none" stroke="#16A34A" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h3 style="font-size:1.1rem;font-weight:700;color:var(--dark);margin:0 0 8px;">Message sent</h3>
  <p style="font-size:0.88rem;color:var(--text-muted);margin:0 0 20px;line-height:1.6;">Thank you for reaching out. I will get back to you within a few days.</p>
  <button onclick="resetContactForm()" style="padding:10px 20px;background:var(--slate-bg);border:1px solid var(--slate-border);border-radius:6px;font-size:0.78rem;font-weight:500;color:var(--dark);cursor:pointer;">Send another message</button>
</div>

<!-- Error state -->
<div id="contact-error" style="display:none;padding:16px 20px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;margin-top:16px;">
  <p style="font-size:0.82rem;color:#991B1B;margin:0;display:flex;align-items:center;gap:8px;">
    <svg width="16" height="16" fill="none" stroke="#DC2626" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    Could not send message. Please try again or email me directly at hasan@hasanjaffal.com
  </p>
</div>

<script>
function submitContactForm(e) {
  e.preventDefault();
  var name = document.getElementById('contact-name').value.trim();
  var email = document.getElementById('contact-email').value.trim();
  var message = document.getElementById('contact-message').value.trim();
  var btn = document.getElementById('contact-submit-btn');
  var errorEl = document.getElementById('contact-error');

  if (!name || !email || !message) return;
  if (document.querySelector('[name="_gotcha"]').value) return;

  btn.disabled = true;
  btn.innerHTML = '<svg width="15" height="15" style="animation:spin 1s linear infinite" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg> Sending...';
  errorEl.style.display = 'none';

  fetch('{{ site.data.firebase.fn_contact }}', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({data: {name: name, email: email, message: message}})
  }).then(function(res) {
    if (res.ok) {
      document.getElementById('contact-form-wrapper').style.display = 'none';
      document.getElementById('contact-success').style.display = 'block';
    } else {
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Message';
    }
  }).catch(function() {
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send Message';
  });
}

function resetContactForm() {
  document.getElementById('contact-form-wrapper').style.display = 'block';
  document.getElementById('contact-success').style.display = 'none';
  document.getElementById('contact-form').reset();
}
</script>

<style>
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
