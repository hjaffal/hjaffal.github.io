<div class="sidebar-recent">
  <span class="card-label">LATEST ARTICLES</span>
  <ul class="sidebar-recent-list">
    {% for post in site.posts limit:5 %}
    <li>
      <a href="{{ post.url | relative_url }}" class="sidebar-recent-item">
        <span class="sidebar-recent-title">{{ post.title }}</span>
        <span class="sidebar-recent-date">{{ post.date | date: "%b %d, %Y" }}</span>
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
