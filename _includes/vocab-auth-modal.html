<div class="vocab-auth-overlay" id="vocab-auth-overlay">
  <div class="vocab-auth-modal" role="dialog" aria-labelledby="vocab-auth-title" aria-modal="true">
    <h2 class="vocab-auth-title" id="vocab-auth-title">Create Account</h2>
    <p class="vocab-auth-desc" id="vocab-auth-desc">Create a free account to unlock all categories, track your progress, and build your streak.</p>

    <form class="vocab-auth-form" id="vocab-auth-form">
      <input type="text" class="vocab-auth-input" id="vocab-auth-name" placeholder="Your name" required aria-label="Your name">
      <input type="email" class="vocab-auth-input" id="vocab-auth-email" placeholder="your@email.com" required aria-label="Email address">
      <input type="password" class="vocab-auth-input" id="vocab-auth-password" placeholder="Password (min 6 characters)" required minlength="6" aria-label="Password">
      <button type="submit" class="vocab-auth-submit" id="vocab-auth-submit">Create Account</button>
    </form>

    <p class="vocab-auth-error" id="vocab-auth-error"></p>

    <div class="vocab-auth-divider">or continue with</div>

    <div class="vocab-auth-social">
      <button class="vocab-auth-social-btn" id="vocab-auth-google" aria-label="Continue with Google">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <p class="vocab-auth-toggle-text" id="vocab-auth-toggle-text">
      Already have an account? <button type="button" id="vocab-auth-login-toggle">Sign in</button>
    </p>
  </div>
</div>
