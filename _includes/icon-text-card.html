{% comment %}
  Icon + text + optional CTA card (used in about page "What you'll find" section).
  Usage: {% include icon-text-card.html icon_svg="<svg>...</svg>" title="Writing" desc="Articles organized by position." url="/writing" %}
{% endcomment %}
<a href="{{ include.url }}" class="icon-text-card">
  <div class="icon-text-card-icon">
    {{ include.icon_svg }}
  </div>
  <div>
    <span class="icon-text-card-title">{{ include.title }}</span>
    <span class="icon-text-card-desc">{{ include.desc }}</span>
  </div>
</a>
