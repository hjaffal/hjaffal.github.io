<div class="sidebar-newsletter">
  <span class="card-label">THE SECOND MIND NEWSLETTER</span>
  <p class="sidebar-newsletter-desc">Risk, intelligence, AI, and decisions before problems become obvious.</p>
  <form class="nl-subscribe-form" onsubmit="return handleNewsletterSubscribe(event, this)">
    <input type="email" placeholder="your@email.com" required class="nl-subscribe-input">
    <input type="text" name="website_url" style="position:absolute;left:-9999px;opacity:0;height:0;" tabindex="-1" autocomplete="off" aria-hidden="true">
    <button type="submit" class="nl-subscribe-btn">Subscribe</button>
    <p class="nl-subscribe-msg" style="display:none;"></p>
  </form>
</div>
