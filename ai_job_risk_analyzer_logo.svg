<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI Job Risk Analyzer Logo</title>
  <desc id="desc">Minimal logo with magnifying glass, bar chart, and AI Job Risk Analyzer wordmark.</desc>

  <style>
    .navy { stroke: #071A33; fill: #071A33; }
    .blue { fill: #1E63FF; }
    .text-main {
      font-family: Inter, Arial, Helvetica, sans-serif;
      font-weight: 700;
      letter-spacing: -1.5px;
    }
  </style>

  <!-- Background intentionally transparent -->

  <!-- Icon group -->
  <g transform="translate(65 50)">
    <!-- Magnifying glass ring -->
    <circle cx="70" cy="70" r="58" stroke="#071A33" stroke-width="18"/>

    <!-- Magnifying glass handle -->
    <line x1="112" y1="112" x2="155" y2="155" stroke="#071A33" stroke-width="20" stroke-linecap="round"/>

    <!-- Simple analytics bars -->
    <rect x="43" y="76" width="18" height="26" rx="4" fill="#1E63FF"/>
    <rect x="70" y="60" width="18" height="42" rx="4" fill="#1E63FF"/>
    <rect x="97" y="40" width="18" height="62" rx="4" fill="#1E63FF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(285 92)">
    <text x="0" y="55" class="text-main" font-size="72">
      <tspan fill="#1E63FF">AI</tspan>
      <tspan fill="#071A33"> Job Risk Analyzer</tspan>
    </text>
  </g>
</svg>
