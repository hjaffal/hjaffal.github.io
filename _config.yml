title: Hasan Jaffal
url: "https://hasanjaffal.com"
author: Hasan Jaffal

navbar-links:
  Writing:
    - _url: "writing"
    - AI & Decision Operations: "positions/ai-decision-operations"
    - Risk Intelligence: "positions/risk-intelligence"
    - AI Job Risk: "positions/ai-job-risk"
  Tools:
    - _url: "tools"
    - AI Job Risk Analyzer: "ai-job-risk-analyzer"
    - Future-Proof Skills Assessment: "future-proof-skills-assessment"
  AI Job Risk: "ai-job-risk-directory"
  Newsletter: "newsletter"
  Lexicon: "lexicon"
  About:
    - _url: "aboutme"
    - About Hasan: "aboutme"
    - Contact: "contact"

avatar: "/assets/img/og-default.png"
round-avatar: false

social-network-links:
  email: "jaftalks@gmail.com"
  linkedin: jaffal

rss-description: "Writing on data, AI, risk, fraud analytics, loss prevention, and operational decision-making."

share-links-active:
  twitter: true
  facebook: false
  linkedin: true
  reddit: true
  vk: false

url-pretty: "hasanjaffal.com"
title-on-all-pages: true

excerpt_length: 45
feed_show_excerpt: true
feed_show_tags: false
post_search: false
edit_page_button: false
navbar-var-length: false

page-col: "#FFFFFF"
text-col: "#0F172A"

link-col: "#0F172A"
hover-col: "#9333EA"

navbar-col: "#FFFFFF"
navbar-text-col: "#0F172A"
navbar-border-col: "#E2E8F0"

footer-col: "#0F172A"
footer-text-col: "#94A3B8"
footer-link-col: "#F1F5F9"
footer-hover-col: "#9333EA"

site-css:
  - "/assets/css/global.css"

site-js:
  - "/assets/js/subscribe.js"
  - "/assets/js/custom-script.js"

gtag: "G-WT6WZ9E4SH"

date_format: "%B %-d, %Y"

timezone: "Europe/Luxembourg"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: false
      social-share: true
      chat_with_me_box: false

  -
    scope:
      path: ""
    values:
      layout: "page"
      chat_with_me_box: false

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/
  - scripts/
  - all-ai-job-risk-audits.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
