<svg width="800" height="520" viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9333EA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9333EA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Decorative orb -->
  <circle cx="720" cy="80" r="120" fill="url(#purpleGlow)"/>

  <!-- Title -->
  <text x="40" y="42" font-size="10" font-weight="700" fill="#9333EA" letter-spacing="3">POST-2028</text>
  <text x="40" y="70" font-size="22" font-weight="800" fill="#F8FAFC" letter-spacing="-0.5">The New Professional Stack</text>

  <!-- Stack layers (bottom to top) -->

  <!-- Layer 5: Eliminated (bottom) -->
  <rect x="40" y="410" width="720" height="72" rx="6" fill="#DC2626" opacity="0.12" stroke="#DC2626" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="40" y="410" width="720" height="72" rx="6" fill="none" stroke="#DC2626" stroke-width="1" stroke-dasharray="4 3" stroke-opacity="0.5"/>
  <text x="60" y="436" font-size="9" font-weight="700" fill="#DC2626" letter-spacing="2">ELIMINATED LAYER</text>
  <text x="60" y="455" font-size="11" font-weight="600" fill="#FCA5A5">40–50% of current workforce</text>
  <text x="60" y="472" font-size="9" fill="#94A3B8">Execution-layer roles absorbed by AI systems. No replacement hiring. Functions automated.</text>
  <text x="680" y="450" font-size="28" font-weight="800" fill="#DC2626" opacity="0.3">✕</text>

  <!-- Layer 4: Specialist Practitioners -->
  <rect x="40" y="332" width="720" height="68" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="332" width="4" height="68" rx="2" fill="#F59E0B"/>
  <text x="60" y="356" font-size="9" font-weight="700" fill="#F59E0B" letter-spacing="1.5">SPECIALIST PRACTITIONERS</text>
  <text x="300" y="356" font-size="8" fill="#64748B">10–15% of workforce</text>
  <text x="60" y="375" font-size="9.5" fill="#CBD5E1">Roles requiring physical presence, licensed authority, or irreducible human interaction.</text>
  <text x="60" y="391" font-size="8" fill="#64748B">Medical · Legal · Trades · Emergency Services</text>

  <!-- Layer 3: AI System Governors -->
  <rect x="40" y="256" width="720" height="68" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="256" width="4" height="68" rx="2" fill="#06B6D4"/>
  <text x="60" y="280" font-size="9" font-weight="700" fill="#06B6D4" letter-spacing="1.5">AI SYSTEM GOVERNORS</text>
  <text x="280" y="280" font-size="8" fill="#64748B">10–15% of workforce</text>
  <text x="60" y="299" font-size="9.5" fill="#CBD5E1">Configure, monitor, and calibrate AI agent networks. Technical oversight without manual execution.</text>
  <text x="60" y="315" font-size="8" fill="#64748B">AI Ops · Model Calibration · Quality Assurance · Pipeline Architecture</text>

  <!-- Layer 2: Judgment Operators -->
  <rect x="40" y="180" width="720" height="68" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="180" width="4" height="68" rx="2" fill="#9333EA"/>
  <text x="60" y="204" font-size="9" font-weight="700" fill="#9333EA" letter-spacing="1.5">JUDGMENT OPERATORS</text>
  <text x="260" y="204" font-size="8" fill="#64748B">15–20% of workforce</text>
  <text x="60" y="223" font-size="9.5" fill="#CBD5E1">Daily trade-off decisions, exception management, AI system direction, stakeholder relationships.</text>
  <text x="60" y="239" font-size="8" fill="#64748B">Senior Managers · Domain Leads · Decision Owners · Client Principals</text>

  <!-- Layer 1: Strategic Owners (top) -->
  <rect x="40" y="100" width="720" height="72" rx="6" fill="#1E293B" stroke="#9333EA" stroke-width="1.5"/>
  <rect x="40" y="100" width="4" height="72" rx="2" fill="#10B981"/>
  <!-- Glow effect -->
  <rect x="41" y="101" width="718" height="70" rx="5" fill="none" stroke="#9333EA" stroke-width="0.5" opacity="0.3"/>
  <text x="60" y="126" font-size="9" font-weight="700" fill="#10B981" letter-spacing="1.5">STRATEGIC OWNERS</text>
  <text x="230" y="126" font-size="8" fill="#64748B">5–8% of workforce</text>
  <text x="60" y="146" font-size="9.5" fill="#F8FAFC" font-weight="500">Set organizational direction, own capital allocation, bear ultimate accountability.</text>
  <text x="60" y="163" font-size="8" fill="#64748B">C-Suite · VPs · Founders · Board-level Decision Makers</text>

  <!-- Right side percentages / visual indicator -->
  <line x1="770" y1="108" x2="770" y2="395" stroke="#334155" stroke-width="1" stroke-dasharray="2 2"/>
  <circle cx="770" cy="136" r="4" fill="#10B981"/>
  <circle cx="770" cy="214" r="4" fill="#9333EA"/>
  <circle cx="770" cy="290" r="4" fill="#06B6D4"/>
  <circle cx="770" cy="366" r="4" fill="#F59E0B"/>
  <circle cx="770" cy="446" r="3" fill="#DC2626" opacity="0.5"/>

  <!-- Arrow indicating AI automation direction -->
  <text x="690" y="505" font-size="8" fill="#64748B" text-anchor="end">AI automates upward →</text>
  <line x1="695" y1="500" x2="750" y2="500" stroke="#DC2626" stroke-width="1.5" opacity="0.6"/>
  <polygon points="750,496 758,500 750,504" fill="#DC2626" opacity="0.6"/>

  <!-- Footer -->
  <text x="40" y="505" font-size="7.5" fill="#475569">hasanjaffal.com · 2028 Agentic AI Workforce Disruption Report</text>
</svg>
